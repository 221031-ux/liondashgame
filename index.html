<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Lion Dance Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <div class="title">🦁 Lion Dance Runner</div>
      <div class="scoreWrap">
        <div class="label">Score</div>
        <div id="score" class="value">0</div>
      </div>
    </header>

    <main class="stageWrap">
      <canvas id="game" width="360" height="640"></canvas>

      <div id="overlay" class="overlay">
        <div class="card">
          <div class="big">Lion Dance Runner</div>
          <div class="sub">Tap / Press to Jump. Dodge obstacles!</div>
          <button id="startBtn" class="btn">Start</button>
        </div>
      </div>

      <div id="toast" class="toast">Get Ready!</div>
    </main>

    <footer class="hint">
      <span>Tip:</span> swipe up (or press) to jump. Land safely to keep running.
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
