<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion Dash - Endless Runner</title>
    <style>
        body { margin:0; background:#000; font-family:Arial; overflow:hidden; }
        canvas { display:block; margin:0 auto; background:#111; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #startScreen, #gameOverScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); color: white; z-index: 20;
        }
        button {
            padding: 15px 30px; font-size: 24px; margin: 10px; cursor: pointer;
            background: #ffcc00; color: #b30000; border: none; border-radius: 10px; font-weight: bold;
        }
        h1 { font-size: 48px; margin: 10px; text-shadow: 3px 3px #b30000; }
    </style>
</head>
<body>
    <div id="ui">
        Score: <span id="score">0</span><br>
        High Score: <span id="high">0</span>
    </div>

    <canvas id="game" width="800" height="400"></canvas>

    <div id="startScreen">
        <h1>🦁 LION DASH</h1>
        <p style="font-size:24px;margin:10px;">Lion Dance Endless Runner</p>
        <button onclick="startGame()">START RUNNING</button>
        <p style="max-width:400px;text-align:center;margin-top:20px;">
            Swipe / Arrow Keys / WASD<br>
            ↑ / Space = Jump  ↓ = Slide
        </p>
    </div>

    <div id="gameOverScreen" style="display:none">
        <h1>GAME OVER</h1>
        <p style="font-size:28px">Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">PLAY AGAIN</button>
        <button onclick="showStart()">MENU</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let highScore = localStorage.getItem('lionDashHigh') || 0;
        document.getElementById('high').textContent = highScore;
        
        let gameRunning = false;
        let speed = 5;
        let gravity = 0.8;
        let lanes = [200, 400, 600]; // left, middle, right
        
        let player = {
            lane: 1,
            x: 400,
            y: 280,
            width: 60,
            height: 80,
            velY: 0,
            jumping: false,
            sliding: false,
            slideTime: 0
        };
        
        let obstacles = [];
        let coins = [];
        let backgroundX = 0;
        
        // Simple animation frame
        let frame = 0;
        
        function drawBackground() {
            // Sky
            ctx.fillStyle = '#ffcc66';
            ctx.fillRect(0, 0, canvas.width, 200);
            
            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 280, canvas.width, canvas.height - 280);
            
            // Road
            ctx.fillStyle = '#555';
            ctx.fillRect(0, 250, canvas.width, 150);
            
            // Lane lines
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 8;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.setLineDash([40, 30]);
                ctx.moveTo(0, 250 + i*50);
                ctx.lineTo(canvas.width, 250 + i*50);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // Festival decorations
            ctx.fillStyle = '#ff0000';
            for (let i = 0; i < 8; i++) {
                let bx = (backgroundX * 0.3 + i * 150) % (canvas.width + 200) - 100;
                ctx.fillRect(bx, 100, 40, 40); // lanterns
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(bx+10, 115, 20, 10);
                ctx.fillStyle = '#ff0000';
            }
        }
        
        function drawPlayer() {
            let px = player.x;
            let py = player.y;
            
            // Lion body (simple)
            ctx.save();
            
            // Legs animation
            let legBob = player.jumping ? 0 : Math.sin(frame / 3) * 5;
            
            // Body
            ctx.fillStyle = '#ff9900';
            ctx.fillRect(px + 10, py + 20, 40, 40); // costume body
            
            // Lion Head
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(px + 35, py + 25, 22, 0, Math.PI * 2);
            ctx.fill();
            
            // Head details
            ctx.fillStyle = '#b30000';
            ctx.beginPath(); // mouth
            ctx.arc(px + 40, py + 30, 12, 0.2, Math.PI - 0.2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(px + 28, py + 20, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px + 42, py + 20, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Ears
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(px + 20, py + 10);
            ctx.lineTo(px + 15, py - 5);
            ctx.lineTo(px + 30, py + 5);
            ctx.fill();
            
            // Tail
            ctx.strokeStyle = '#ff9900';
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.moveTo(px + 15, py + 45);
            ctx.quadraticCurveTo(px - 5, py + 35, px - 10, py + 55);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawObstacle(obs) {
            ctx.fillStyle = '#333';
            ctx.fillRect(obs.x, obs.y, 50, 60); // crate / drum
            
            // Red details
            ctx.fillStyle = '#b30000';
            ctx.fillRect(obs.x + 10, obs.y + 10, 30, 10);
        }
        
        function drawCoin(c) {
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(c.x + 15, c.y + 15, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#b30000';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('¥', c.x + 15, c.y + 22);
        }
        
        function update() {
            if (!gameRunning) return;
            
            frame++;
            score += 1;
            document.getElementById('score').textContent = Math.floor(score / 5);
            
            // Increase difficulty
            if (score % 800 === 0) speed = Math.min(speed + 0.3, 12);
            
            // Background scroll
            backgroundX -= speed * 0.8;
            
            // Player movement
            player.x = lanes[player.lane];
            
            if (player.jumping) {
                player.velY += gravity;
                player.y += player.velY;
                if (player.y >= 280) {
                    player.y = 280;
                    player.jumping = false;
                    player.velY = 0;
                }
            }
            
            if (player.sliding) {
                player.slideTime--;
                if (player.slideTime <= 0) player.sliding = false;
            }
            
            // Spawn obstacles & coins
            if (Math.random() < 0.03) {
                let lane = Math.floor(Math.random() * 3);
                obstacles.push({
                    x: canvas.width + 50,
                    y: 280,
                    lane: lane,
                    width: 50,
                    height: 60
                });
            }
            
            if (Math.random() < 0.04) {
                let lane = Math.floor(Math.random() * 3);
                coins.push({
                    x: canvas.width + 50,
                    y: 200 + Math.random() * 80,
                    lane: lane,
                    collected: false
                });
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= speed;
                
                if (o.x < -60) {
                    obstacles.splice(i, 1);
                    continue;
                }
                
                // Collision
                if (o.lane === player.lane) {
                    let playerBottom = player.y + (player.sliding ? 30 : player.height);
                    if (o.x < player.x + player.width - 10 && 
                        o.x + o.width > player.x + 20 &&
                        player.y + 20 < o.y + o.height) {
                        gameOver();
                        return;
                    }
                }
            }
            
            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i];
                c.x -= speed;
                
                if (c.x < -40) {
                    coins.splice(i, 1);
                    continue;
                }
                
                if (!c.collected && c.lane === player.lane) {
                    if (c.x < player.x + player.width && 
                        c.x + 30 > player.x &&
                        c.y < player.y + player.height && 
                        c.y + 30 > player.y) {
                        c.collected = true;
                        score += 80;
                        coins.splice(i, 1);
                    }
                }
            }
        }
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            
            // Draw coins
            for (let c of coins) {
                if (!c.collected) drawCoin(c);
            }
            
            // Draw obstacles
            for (let o of obstacles) {
                drawObstacle(o);
            }
            
            drawPlayer();
        }
        
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            speed = 6;
            obstacles = [];
            coins = [];
            player.y = 280;
            player.jumping = false;
            player.sliding = false;
        }
        
        function gameOver() {
            gameRunning = false;
            if (score / 5 > highScore) {
                highScore = Math.floor(score / 5);
                localStorage.setItem('lionDashHigh', highScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score / 5);
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }
        
        function showStart() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }
        
        // Controls
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (player.lane > 0) player.lane--;
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (player.lane < 2) player.lane++;
                    break;
                case ' ':
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (!player.jumping && !player.sliding) {
                        player.jumping = true;
                        player.velY = -18;
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (!player.jumping) {
                        player.sliding = true;
                        player.slideTime = 25;
                    }
                    break;
            }
        });
        
        // Touch swipe support
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        
        canvas.addEventListener('touchend', e => {
            if (!gameRunning) return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let deltaX = touchEndX - touchStartX;
            let deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe
                if (deltaX < -80 && player.lane > 0) player.lane--;
                if (deltaX > 80 && player.lane < 2) player.lane++;
            } else {
                // Vertical swipe
                if (deltaY < -80 && !player.jumping && !player.sliding) {
                    player.jumping = true;
                    player.velY = -18;
                }
                if (deltaY > 60 && !player.jumping) {
                    player.sliding = true;
                    player.slideTime = 25;
                }
            }
        });
        
        // Start the loop
        gameLoop();
        
        // Mobile friendly
        console.log('%cLion Dash ready! Enjoy the lion dance run 🦁', 'color:#ffcc00;font-size:16px');
    </script>
</body>
</html>
